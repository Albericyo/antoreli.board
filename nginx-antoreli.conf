server {
    listen 80;
    server_name antoreli.local;

    root /srv/antoreli;
    index index.html;

    access_log /var/log/nginx/antoreli-access.log;
    error_log /var/log/nginx/antoreli-error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 7d;
        access_log off;
    }
}
