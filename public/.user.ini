; Configuration PHP pour les uploads longs (Hostinger / LiteSpeed).
; À placer dans le document root (souvent public/).
; Rechargement : attendre quelques minutes ou redémarrer PHP depuis le panneau.

max_execution_time = 600
max_input_time = 600
; Si votre hébergeur l’accepte (LiteSpeed), décommenter la ligne suivante pour éviter la coupure à 2 s :
; hard_timeout = 600
